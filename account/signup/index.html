<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Create CloudSave</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/Logo_v4.ico" type="image/x-icon">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>
  <div>
    <h1>Create CloudSave</h1>

    <input id="username" placeholder="Enter a Username (15 characters or less)"><br>
    <input id="password" placeholder="Enter a UNIQUE Password" type="password"><br>
    <br>
    <center><div class="g-recaptcha" data-sitekey="6Le2UpssAAAAAIujAkKK_bCqmYPG4gQffiFXWtg7"></div></center><br>
    <button id="register">Register</button>

    <!-- Error display -->
    <div id="error" class="error"></div>

    <!-- Navigation link -->
    <p style="margin-top:15px;">
      <a href="../login/" class="link">Already have a CloudSave? <u>Log in!</u></a>
    </p>
    <a href="/"><img style="width: 33px;" src="/home.webp"></a>
  </div>

  <script type="module">
    import { auth, db, createUserWithEmailAndPassword, setDoc, doc, signInWithEmailAndPassword } from "/firebase.js";

    const errorDiv = document.getElementById("error");

    document.getElementById("register").onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      errorDiv.innerText = "";

      if (!username || !password) {
        errorDiv.innerText = "Please enter both username and password.";
        return;
      }

      const captchaResponse = grecaptcha.getResponse();

      if (!captchaResponse) {
        errorDiv.innerText = "Please complete the CAPTCHA.";
        return;
      }
      if (username.length > 15) {
        errorDiv.innerText = "Username must be 15 characters or less.";
          return;
      }
      try {
        const email = username + "@maxiroon.xyz";

        // Create account
        await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", username), {
          username,
          MSMiS: "",
          DOFiS: ""
        });

        // Auto-login
        await signInWithEmailAndPassword(auth, email, password);
        localStorage.setItem("username", username);

        window.location = "/account";

      } catch (e) {
        errorDiv.innerText = e.message;
      }
    };
  </script>
</body>

</html>
